kind = "web"
previewPath = "/"
title = "Homebase"
version = "1.0.0"
id = "artifacts/homebase"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5000

[services.development]
run = "cd /home/runner/workspace/artifacts/homebase && PORT=5000 BASE_PATH=/ node_modules/.bin/vite --config vite.config.ts --host 0.0.0.0"

[services.production]
build = [ "pnpm", "--filter", "@workspace/homebase", "run", "build" ]
publicDir = "artifacts/homebase/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5000"
BASE_PATH = "/"
